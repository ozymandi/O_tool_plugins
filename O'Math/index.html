<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; img-src 'self' data:;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O'Math</title>
    <link rel="stylesheet" href="./css/main.css">
</head>
<body class="is-idle">
    <main class="app">
        <section class="panel" data-lockable>
            <h2>Surface</h2>
            <div class="simple-dropdown custom-select-wrapper" data-id="surface">
                <input id="surface" type="hidden" value="Cube (Sharp)">
                <div class="custom-select ui-dropdown-toggle" tabindex="0" role="button" aria-haspopup="listbox" aria-expanded="false">
                    <span id="surfaceLabel" class="ui-dropdown-label">Cube (Sharp)</span>
                    <span class="dropdown-chevron" aria-hidden="true">
                        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M4.5 6.5L8 10L11.5 6.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"></path>
                        </svg>
                    </span>
                </div>
                <div id="surfaceOptions" class="custom-options ui-dropdown-list" role="listbox" aria-label="Surface"></div>
            </div>
        </section>

        <section class="panel" data-lockable>
            <h2>Shape Parameters</h2>
            <div class="params-row">
                <div class="param-cell" id="paramCellA">
                    <span class="field-label" id="paramLabelA">Width X</span>
                    <input id="paramA" type="number" step="0.1" value="1.0">
                </div>
                <div class="param-cell" id="paramCellB">
                    <span class="field-label" id="paramLabelB">Depth Y</span>
                    <input id="paramB" type="number" step="0.1" value="1.0">
                </div>
                <div class="param-cell" id="paramCellC">
                    <span class="field-label" id="paramLabelC">Height Z</span>
                    <input id="paramC" type="number" step="0.1" value="1.0">
                </div>
                <div class="param-cell" id="paramCellD">
                    <span class="field-label" id="paramLabelD">—</span>
                    <input id="paramD" type="number" step="0.1" value="2.5">
                </div>
            </div>
        </section>

        <section class="panel" data-lockable>
            <h2>Render</h2>
            <label class="field">
                <span class="field-label">View mode</span>
                <div class="mode-segmented" role="group" aria-label="View mode">
                    <button class="mode-seg" type="button" data-view="wire" title="Wireframe (transparent)">WIRE</button>
                    <button class="mode-seg" type="button" data-view="hidden" title="Hidden lines (solid)">HIDDEN</button>
                </div>
                <input id="viewMode" type="hidden" value="hidden">
            </label>
            <label class="field">
                <span class="field-label">Scale</span>
                <div class="slider-capsule">
                    <input id="scale" type="number" min="1" max="500" step="1" value="60">
                    <div class="slider-track-area">
                        <input id="scaleRange" type="range" min="10" max="200" step="1" value="60">
                    </div>
                    <button id="scaleResetBtn" class="slider-reset-btn" type="button" title="Reset to 60">
                        <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <path d="M3 3L9 9M9 3L3 9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>
            </label>
            <label class="field">
                <span class="field-label">Density</span>
                <div class="slider-capsule">
                    <input id="density" type="number" min="3" max="80" step="1" value="18">
                    <div class="slider-track-area">
                        <input id="densityRange" type="range" min="6" max="40" step="1" value="18">
                    </div>
                    <button id="densityResetBtn" class="slider-reset-btn" type="button" title="Reset to 18">
                        <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <path d="M3 3L9 9M9 3L3 9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>
            </label>
            <label class="check">
                <input id="smooth" type="checkbox">
                <span>Apply smoothness</span>
            </label>
        </section>

        <section class="panel">
            <div class="action-row">
                <button id="primaryBtn" class="primary action-btn" type="button">GENERATE</button>
                <button id="cancelBtn" class="action-btn" type="button" data-show-active disabled>CANCEL</button>
            </div>
            <p class="sub" id="actionHint">Open a document, then press GENERATE to start a live preview.</p>
        </section>

        <section class="panel">
            <div class="status-row">
                <div class="status-left">
                    <span id="statusDot" class="status-indicator status-indicator--info"></span>
                    <div id="status" class="status" title="Connecting to Illustrator...">Connecting to Illustrator...</div>
                </div>
            </div>
            <p class="footer-note">Preview is centered on the active artboard. APPLY commits the current preview as a final group; CANCEL discards it.</p>
        </section>
    </main>

    <script src="./js/main.js"></script>
</body>
</html>
