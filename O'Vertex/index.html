<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; img-src 'self' data:;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O'Vertex</title>
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
    <main class="app">
        <section class="panel">
            <h2>Settings</h2>
            <label class="field">
                <span class="field-label">Stroke width (pt)</span>
                <input id="strokeWidth" type="number" min="0.01" max="20" step="0.01" value="0.1">
            </label>
        </section>

        <section class="panel">
            <button id="extractBtn" class="primary action-btn" type="button">EXTRACT VERTICES</button>
            <p class="sub">Pick anchors with the Direct Selection Tool (A), then press EXTRACT VERTICES.</p>
        </section>

        <section class="panel">
            <div class="status-row">
                <div class="status-left">
                    <span id="statusDot" class="status-indicator status-indicator--info"></span>
                    <div id="status" class="status" title="Connecting to Illustrator...">Connecting to Illustrator...</div>
                </div>
            </div>
            <p class="footer-note">All single-point paths land in a group named "Vertex_Generation_Nodes" — feed it into O'Line / O'GridGen.</p>
        </section>
    </main>

    <script src="./js/main.js"></script>
</body>
</html>
