<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; img-src 'self' data:;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O'Symbol</title>
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
    <main class="app">
        <section class="panel">
            <h2>Settings</h2>
            <label class="check">
                <input id="replace" type="checkbox" checked>
                <span>Replace objects with symbol instances</span>
            </label>
        </section>

        <section class="panel">
            <button id="createBtn" class="primary action-btn" type="button">CREATE SYMBOLS</button>
            <p class="sub">Each selected object becomes its own Symbol. With Replace on, originals are swapped for symbol instances at the same position.</p>
        </section>

        <section class="panel">
            <div class="status-row">
                <div class="status-left">
                    <span id="statusDot" class="status-indicator status-indicator--info"></span>
                    <div id="status" class="status" title="Connecting to Illustrator...">Connecting to Illustrator...</div>
                </div>
            </div>
            <p class="footer-note">Symbol names come from object names; otherwise auto-named O_Symbol_<n>.</p>
        </section>
    </main>

    <script src="./js/main.js"></script>
</body>
</html>
